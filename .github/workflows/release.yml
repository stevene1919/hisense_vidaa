name: Create Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Extract changelog
        id: extract_changelog
        run: |
          # Get the tag name (e.g. v1.1.0 or 1.1.0)
          TAG_NAME="${{ github.ref_name }}"
          # Clean tag name to match version header in changelog (e.g. 1.1.0)
          VERSION="${TAG_NAME#v}"
          
          echo "Extracting release notes for version $VERSION..."
          
          # Extract lines between the version header and the next version header
          # (matches ## [VERSION] or ## VERSION)
          sed -n "/## \[$VERSION\]/,/## /p" CHANGELOG.md | sed '$d' > release_notes.txt
          
          # If file is empty, fallback to GitHub autogenerated notes
          if [ ! -s release_notes.txt ]; then
            echo "No custom release notes found in CHANGELOG.md, using autogenerated notes."
            echo "autogenerate=true" >> $GITHUB_OUTPUT
          else
            echo "autogenerate=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Create GitHub Release
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [ "${{ steps.extract_changelog.outputs.autogenerate }}" = "true" ]; then
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --generate-notes
          else
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file release_notes.txt
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
